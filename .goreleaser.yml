project_name: asana
version: 2

before:
  hooks:
    - go mod verify
    - go mod tidy

release:
  prerelease: auto
  name_template: "Asana CLI {{ .Version }}"
  header: |
    ## Release {{ .Version }}

    For installation instructions, please visit our [documentation](https://github.com/jtsternberg/asana-cli#installation).
  footer: |
    **Full Changelog**: https://github.com/jtsternberg/asana-cli/compare/{{ .PreviousTag }}...{{ .Tag }}
builds:
  - env:
      - CGO_ENABLED=0
    main: ./cmd/asana
    ldflags:
      - "-s -w \
        -X github.com/timwehrle/asana/internal/build.Version={{ .Version }} \
        -X github.com/timwehrle/asana/internal/build.Date={{ .Date }}"
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - "386"
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: ["tar.gz"]
    id: tar
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
    format_overrides:
      - goos: windows
        formats: ["zip"]

changelog:
  use: github
  format: "{{.SHA}}: {{.Message}} by @{{.AuthorUsername}}"
  abbrev: 7
  sort: asc
  filters:
    exclude:
      - "^tests:"
      - "^test:"
      - "^test\\("
  groups:
    - title: "Features"
      regexp: '^.*?(feat|Add)(\([^)]+\))?!?:?\s?.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: "Security updates"
      regexp: '^.*?sec(\(.+\))??!?:.+$'
      order: 2
    - title: "Build process updates"
      regexp: '^.*?(build|ci)(\(.+\))??!?:.+$'
      order: 3
    - title: "Dependency updates"
      regexp: '^.*?(.+)\(deps\)!?:.+$'
      order: 4
    - title: "Documentation updates"
      regexp: '^.*?docs?(\(.+\))??!?:.+$'
      order: 5
    - title: "Other updates"
      order: 999

checksum:
  name_template: "checksums.txt"

nfpms:
  - license: MIT
    maintainer: jtsternberg
    homepage: https://github.com/jtsternberg/asana-cli
    dependencies:
      - git
    description: A command-line interface for managing Asana directly from your terminal.
    formats:
      - deb
      - rpm
